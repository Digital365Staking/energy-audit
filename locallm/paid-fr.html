<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💳 LLMS LOCAUX : COURS PAYANTS</title>
 <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8871804905835108"
     crossorigin="anonymous"></script>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #b0e2ff;
    color: #1a1a1a;
    line-height: 1.6;
  }

  .container {
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    color: #0b3c5d;
  }

  /* LIST STYLING */
  .list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .list-item {
    display: grid;
    grid-template-columns: 120px 1fr 150px;
    align-items: center;
    gap: 20px;
    padding: 15px;
    border-radius: 12px;
    background: #f9fbfd;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .list-item img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
  }

  .list-text {
    font-size: 1rem;
  }

  .list-button {
    text-align: center;
  }

  .btn {
    display: inline-block;
    padding: 10px 18px;
    background: #0b3c5d;
    color: white;
    border-radius: 25px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }

  .btn:hover {
    background: #1d6fa5;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .list-item {
      grid-template-columns: 1fr;
      text-align: center;
    }

    .list-button {
      text-align: center;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>💳 COURS PAYANTS</h1>

  <div class="list">

  </div>
</div>

</body>
</html>
