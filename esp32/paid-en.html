<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>List Template</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #b0e2ff;
    color: #1a1a1a;
    line-height: 1.6;
  }

  .container {
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    color: #0b3c5d;
  }

  /* LIST STYLING */
  .list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .list-item {
    display: grid;
    grid-template-columns: 120px 1fr 150px;
    align-items: center;
    gap: 20px;
    padding: 15px;
    border-radius: 12px;
    background: #f9fbfd;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .list-item img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
  }

  .list-text {
    font-size: 1rem;
  }

  .list-button {
    text-align: right;
  }

  .btn {
    display: inline-block;
    padding: 10px 18px;
    background: #0b3c5d;
    color: white;
    border-radius: 25px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }

  .btn:hover {
    background: #1d6fa5;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .list-item {
      grid-template-columns: 1fr;
      text-align: center;
    }

    .list-button {
      text-align: center;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>My List</h1>

  <div class="list">

    <!-- ITEM -->
    <div class="list-item">
      <img src="https://via.placeholder.com/120" alt="Image">
      <div class="list-text">
        <strong>Item Title</strong><br>
        Short description of the item goes here.
      </div>
      <div class="list-button">
        <a href="#" class="btn">View</a>
      </div>
    </div>

    <!-- ITEM -->
    <div class="list-item">
      <img src="https://via.placeholder.com/120" alt="Image">
      <div class="list-text">
        <strong>Another Item</strong><br>
        Additional description for this entry.
      </div>
      <div class="list-button">
        <a href="#" class="btn">Learn More</a>
      </div>
    </div>

  </div>
</div>

</body>
</html>
