<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM IFC Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
body { margin:0; overflow:hidden; font-family:system-ui; background:#0D1117; color:#fff; }
header { height:50px; display:flex; align-items:center; padding:0 12px; background:#161B22; border-bottom:1px solid #222; }
main { display:flex; height:calc(100vh - 50px); }
.panel { width:320px; background:#161B22; border-right:1px solid #222; display:flex; flex-direction:column; }
.panel-section { padding:12px; border-bottom:1px solid #222; }
.dropzone { border:1px dashed #444; padding:20px; text-align:center; cursor:pointer; }
button { margin:4px; padding:8px; background:#222; color:#fff; border:1px solid #444; cursor:pointer; }
button:disabled { opacity:0.4; }
.viewport { flex:1; }
canvas { width:100%; height:100%; display:block; }
pre { font-size:11px; overflow:auto; flex:1; padding:10px; }
</style>
</head>

<body>

<header>
  <div><b>FullBIM IFC Viewer</b></div>
</header>

<main>

<!-- PANEL -->
<div class="panel">
  <div class="panel-section">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept=".ifc" hidden/>
      Drop IFC or click
    </div>
  </div>

  <div class="panel-section">
    <button id="btnDownload" disabled>Download JSON</button>
    <button id="btnReset" disabled>Reset</button>
  </div>

  <pre id="log"></pre>
</div>

<!-- VIEW -->
<div class="viewport">
  <canvas id="canvas"></canvas>
</div>

</main>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.128/examples/jsm/controls/OrbitControls.js";

/* ---------------- SCENE ---------------- */
const canvas = document.getElementById("canvas");

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(window.innerWidth - 320, window.innerHeight - 50);
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0D1117);

const camera = new THREE.PerspectiveCamera(
  60,
  (window.innerWidth - 320) / (window.innerHeight - 50),
  0.1,
  1000
);
camera.position.set(10, 10, 10);

/* ✅ FIX: OrbitControls */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = true;
controls.enableZoom = true;
controls.enableRotate = true;

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(10, 20, 10);
scene.add(light);

/* GRID */
scene.add(new THREE.GridHelper(50, 50));

/* MODEL GROUP */
let modelGroup = new THREE.Group();
scene.add(modelGroup);

/* ---------------- RENDER LOOP ---------------- */
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ---------------- RESIZE FIX ---------------- */
window.addEventListener("resize", () => {
  const w = window.innerWidth - 320;
  const h = window.innerHeight - 50;

  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

/* ---------------- BACKEND ---------------- */
let currentJson = null;
let currentJsonStr = null;

const log = (m) => {
  document.getElementById("log").textContent += m + "\n";
};

function setEnabled(state){
  document.getElementById("btnDownload").disabled = !state;
  document.getElementById("btnReset").disabled = !state;
}

/* ---------------- LOAD IFC ---------------- */
async function loadIFC(file){
  log("Uploading IFC...");

  try{
    const form = new FormData();
    form.append("file", file);

    const res = await fetch("https://ifcjsonbackend-production.up.railway.app/convert-ifc", {
      method:"POST",
      body:form
    });

    if(!res.ok) throw new Error(await res.text());

    const json = await res.json();

    log("Backend OK");
    log("Entities: " + (json.data?.length || 0));

    currentJson = json;
    currentJsonStr = JSON.stringify(json, null, 2);

    setEnabled(true);

    /* ---------------- SIMPLE 3D VISUAL ---------------- */
    modelGroup.clear();

    const data = json.data || [];

    data.forEach((e, i) => {
      const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x58A6FF
      });

      const mesh = new THREE.Mesh(geo, mat);

      mesh.position.set(
        (i % 10) * 0.7,
        0,
        Math.floor(i / 10) * 0.7
      );

      modelGroup.add(mesh);
    });

  } catch(err){
    log("Backend failed: " + err.message);
  }
}

/* ---------------- UI ---------------- */
document.getElementById("fileInput").addEventListener("change",(e)=>{
  const f = e.target.files[0];
  if(f) loadIFC(f);
});

document.getElementById("dropzone").onclick = () => {
  document.getElementById("fileInput").click();
};

document.getElementById("btnDownload").onclick = () => {
  const blob = new Blob([currentJsonStr], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ifc.json";
  a.click();
};

document.getElementById("btnReset").onclick = () => {
  modelGroup.clear();
  currentJson = null;
  currentJsonStr = null;
  document.getElementById("log").textContent = "";
  setEnabled(false);
};

</script>

</body>
</html>
