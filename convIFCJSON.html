<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM · Mobile Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
:root {
  --bg:#eaf7ff;
  --card:#ffffff;
  --ink:#1a1a1a;
  --title:#0b3c5d;
  --accent:#1890ff;
  --accent2:#1d6fa5;
  --soft:#f5fbff;
  --line:#cfe3f3;
  --shadow:0 10px 25px rgba(0,0,0,.12);
}

*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui}

body{
  background:var(--bg);
}

/* ===== VIEWER ===== */
.viewport{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 50% 40%,#fff 0%,#dff3ff 60%,#cfeaff 100%);
}
canvas{width:100%;height:100%;display:block}

/* ===== TOP BAR (minimal) ===== */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  z-index:50;
}

.brand{
  font-weight:800;
  color:var(--title);
  font-size:.95rem;
}

.status{
  font-size:.7rem;
  padding:3px 10px;
  border-radius:20px;
  background:#d7eef9;
  color:#1d6fa5;
  font-weight:700;
}

/* ===== FAB BUTTONS ===== */
.fab-stack{
  position:fixed;
  right:12px;
  bottom:90px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:60;
}

.fab{
  width:48px;
  height:48px;
  border-radius:50%;
  border:none;
  background:var(--title);
  color:#fff;
  font-size:18px;
  box-shadow:var(--shadow);
}

.fab.secondary{background:var(--accent2)}

/* ===== MAIN BOTTOM SHEET ===== */
.sheet{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:280px;
  background:var(--card);
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  box-shadow:0 -10px 30px rgba(0,0,0,.12);
  transform:translateY(210px);
  transition:.25s ease;
  z-index:70;
  display:flex;
  flex-direction:column;
}

.sheet.open{
  transform:translateY(0);
}

.sheet-handle{
  width:50px;
  height:5px;
  background:#cfe3f3;
  border-radius:20px;
  margin:8px auto;
}

.sheet-content{
  padding:10px;
  overflow:auto;
}

/* upload */
.drop{
  border:2px dashed #99cee8;
  border-radius:14px;
  padding:14px;
  text-align:center;
  background:var(--soft);
  margin-bottom:10px;
}

/* buttons row */
.row{
  display:flex;
  gap:8px;
}

.btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  font-weight:700;
  background:var(--title);
  color:#fff;
}

.btn.secondary{
  background:#fff;
  border:1px solid var(--line);
  color:var(--title);
}

/* ===== POPUP ===== */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  z-index:100;
}

.popup.visible{display:block}

.popup-card{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  max-height:70%;
  overflow:auto;
  padding:14px;
}

/* ===== EMPTY STATE ===== */
.empty{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.empty-card{
  background:rgba(255,255,255,.85);
  padding:18px;
  border-radius:14px;
  text-align:center;
  border:1px solid var(--line);
}

/* ===== hidden desktop junk ===== */
.log,.stats,.hud,.dwg,.err{display:none}
</style>
</head>

<body>

<div class="viewport">
  <canvas id="canvas"></canvas>

  <div class="empty" id="empty">
    <div class="empty-card">
      🏗<br>
      Drop a BIM file
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">FullBIM</div>
  <div class="status" id="status">IDLE</div>
</div>

<!-- FLOATING ACTIONS -->
<div class="fab-stack">
  <button class="fab" id="fabUpload">＋</button>
  <button class="fab secondary" id="fabFit">⊡</button>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>

  <div class="sheet-content">

    <div class="drop" id="drop">
      Tap or drop file (.ifc .dxf .dwg .json)
      <input type="file" id="file" hidden />
    </div>

    <div class="row">
      <button class="btn" id="btnReset">Reset</button>
      <button class="btn secondary" id="btnDownload">JSON</button>
    </div>

  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-card" id="popupCard">
    <button id="closePopup">Close</button>
    <div id="popupContent"></div>
  </div>
</div>

<script>
/* ===== THREE SETUP ===== */
const canvas = document.getElementById("canvas");
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(devicePixelRatio);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeaf7ff);

const camera = new THREE.PerspectiveCamera(60,1,0.1,10000);
camera.position.set(10,10,10);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

const light = new THREE.AmbientLight(0xffffff,1);
scene.add(light);

const group = new THREE.Group();
scene.add(group);

/* resize */
function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
addEventListener("resize",resize);resize();

(function loop(){
  requestAnimationFrame(loop);
  controls.update();
  renderer.render(scene,camera);
})();

/* ===== UI STATE ===== */
const sheet=document.getElementById("sheet");
const status=document.getElementById("status");
const empty=document.getElementById("empty");

/* open sheet */
document.getElementById("fabUpload").onclick=()=>sheet.classList.toggle("open");

/* fit */
document.getElementById("fabFit").onclick=()=>alert("fitCamera() hook here");

/* file input */
document.getElementById("drop").onclick=()=>file.click();
const file=document.getElementById("file");

/* simple loader placeholder */
file.onchange=()=> {
  status.textContent="LOADING";
  empty.style.display="none";
};

/* reset */
document.getElementById("btnReset").onclick=()=>{
  group.clear();
  status.textContent="IDLE";
  empty.style.display="flex";
};

/* download */
document.getElementById("btnDownload").onclick=()=>{
  alert("export JSON hook");
};

/* popup */
const popup=document.getElementById("popup");
document.getElementById("closePopup").onclick=()=>popup.classList.remove("visible");
</script>

</body>
</html>
