<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM · IFC → JSON</title>

<style>
  :root {
    --bg: #b0e2ff;
    --card: #ffffff;
    --ink: #1a1a1a;
    --title: #0b3c5d;
    --accent: #1890ff;
    --accent-2: #1d6fa5;
    --soft: #e6f7ff;
    --line: rgba(11, 60, 93, 0.12);
    --shadow: 0 10px 30px rgba(0,0,0,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: min(100%, 920px);
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 32px;
  }

  h1 {
    font-size: 1.6rem;
    margin: 0 0 8px 0;
    color: var(--title);
  }

  .subtitle {
    font-size: 0.95rem;
    color: #4f6780;
    margin-bottom: 20px;
  }

  .drop {
    border: 1px dashed #cfe0ea;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    background: var(--soft);
    transition: 0.15s ease;
  }
  .drop:hover, .drop.drag-over {
    border-color: var(--accent);
    background: #dbeef8;
  }
  .drop input { display: none; }

  .drop-title {
    font-weight: 700;
    color: var(--title);
    margin-bottom: 4px;
  }
  .drop-sub {
    font-size: 0.9rem;
    color: #4f6780;
  }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 18px;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    background: var(--title);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s ease;
  }
  .btn:hover {
    transform: translateY(-1px);
    background: var(--accent-2);
  }
  .btn.secondary {
    background: #eaf5fb;
    color: var(--title);
    border: 1px solid #cfe0ea;
  }
  .btn.secondary:hover {
    background: #dff0fa;
  }
  .btn:disabled {
    opacity: 0.35;
    cursor: default;
    transform: none;
  }

  .status {
    font-family: 'Segoe UI', sans-serif;
    font-size: 0.9rem;
    color: #245b7d;
    background: var(--soft);
    border: 1px solid #cfefff;
    border-radius: 999px;
    padding: 8px 12px;
    margin-top: 16px;
    display: inline-block;
  }

  .viewport {
    margin-top: 22px;
    position: relative;
    height: 320px;
    border-radius: 12px;
    overflow: hidden;
    touch-action: none;
    background: radial-gradient(circle at center, #ffffff 0%, #eaf7ff 52%, #d5efff 100%);
    border: 1px solid #dbe9f3;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .empty-card {
    background: rgba(255,255,255,0.88);
    border: 1px solid #dbe9f3;
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    max-width: 320px;
  }
  .empty-card strong {
    display: block;
    color: var(--title);
    margin-bottom: 6px;
    font-size: 1.05rem;
  }
  .empty-card span {
    color: #4f6780;
    font-size: 0.92rem;
  }

  .note {
    font-size: 0.9rem;
    color: #35556e;
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>FullBIM · IFC → JSON</h1>
  <div class="subtitle">Upload an IFC file and download the JSON result.</div>

  <div class="drop" id="drop">
    <input type="file" id="fileInput" accept=".ifc,application/octet-stream" />
    <div class="drop-title">Drop .ifc here or click</div>
    <div class="drop-sub">Uploads to the backend, then you can download JSON</div>
  </div>

  <div class="actions">
    <button class="btn" id="btnDownload" disabled>Download JSON</button>
    <button class="btn secondary" id="btnDemo">Load demo IFC</button>
  </div>

  <div class="status" id="status">IDLE</div>

  <div class="viewport" id="viewport">
    <canvas id="canvas"></canvas>
    <div class="empty" id="empty">
      <div class="empty-card">
        <strong>No model</strong>
        <span>Upload an IFC or use the demo.</span>
      </div>
    </div>
  </div>

  <div class="note">
    Drag or click to upload. After upload, the JSON appears in the browser and you can download it.
  </div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.128/examples/jsm/controls/OrbitControls.js";

const canvas = document.getElementById("canvas");
const viewport = document.getElementById("viewport");
const drop = document.getElementById("drop");
const fileInput = document.getElementById("fileInput");
const btnDownload = document.getElementById("btnDownload");
const btnDemo = document.getElementById("btnDemo");
const statusEl = document.getElementById("status");
const empty = document.getElementById("empty");

const BACKEND = "https://ifcjsonbackend-production.up.railway.app/convert-ifc";

let jsonText = null;
let modelGroup = new THREE.Group();

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(viewport.clientWidth, viewport.clientHeight, false);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeaf7ff);

const camera = new THREE.PerspectiveCamera(60, viewport.clientWidth / viewport.clientHeight, 0.1, 10000);
camera.position.set(10, 10, 10);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.PAN
};
controls.touches = {
  ONE: THREE.TOUCH.ROTATE,
  TWO: THREE.TOUCH.DOLLY_PAN
};
controls.screenSpacePanning = true;
controls.minDistance = 0.1;
controls.maxDistance = 5000;

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(20, 40, 20);
scene.add(light);

const grid = new THREE.GridHelper(100, 100, 0x78a6c8, 0xc5dce9);
scene.add(grid);
scene.add(modelGroup);

function resize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

function loadDemo() {
  modelGroup.clear();
  const geo = new THREE.BoxGeometry(1, 1, 1);
  const mat = new THREE.MeshStandardMaterial({ color: 0x1890ff });
  const cube = new THREE.Mesh(geo, mat);
  modelGroup.add(cube);
  empty.style.display = "none";
  statusEl.textContent = "DEMO READY";
  btnDownload.disabled = false;
  jsonText = JSON.stringify({ demo: true, name: "demo-box" }, null, 2);
}

btnDemo.addEventListener("click", loadDemo);

function uploadFile(file) {
  const form = new FormData();
  form.append("file", file, file.name);

  statusEl.textContent = "UPLOADING";
  drop.style.cursor = "wait";

  fetch(BACKEND, { method: "POST", body: form })
    .then(res => {
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    })
    .then(json => {
      jsonText = JSON.stringify(json, null, 2);
      modelGroup.clear();
      const geo = new THREE.BoxGeometry(1, 1, 1);
      const mat = new THREE.MeshStandardMaterial({ color: 0x1890ff });
      const cube = new THREE.Mesh(geo, mat);
      modelGroup.add(cube);
      empty.style.display = "none";
      statusEl.textContent = "READY";
      btnDownload.disabled = false;
      drop.style.cursor = "pointer";
    })
    .catch(err => {
      statusEl.textContent = "ERROR";
      console.error(err);
      drop.style.cursor = "pointer";
    });
}

drop.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", e => {
  const file = e.target.files?.[0];
  if (file) uploadFile(file);
  fileInput.value = "";
});

drop.addEventListener("dragover", e => {
  e.preventDefault();
  drop.classList.add("drag-over");
});
drop.addEventListener("dragleave", e => {
  e.preventDefault();
  drop.classList.remove("drag-over");
});
drop.addEventListener("drop", e => {
  e.preventDefault();
  drop.classList.remove("drag-over");
  const file = e.dataTransfer?.files?.[0];
  if (file) uploadFile(file);
});

btnDownload.addEventListener("click", () => {
  if (!jsonText) return;
  const blob = new Blob([jsonText], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ifc.json";
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
