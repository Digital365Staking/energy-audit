<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM · IFC → JSON</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
  :root {
    --bg: #b0e2ff;
    --card: #ffffff;
    --ink: #1a1a1a;
    --title: #0b3c5d;
    --accent: #b0e2ff;
    --accent-2: #1d6fa5;
    --soft: #e6f7ff;
    --line: rgba(11, 60, 93, 0.12);
    --shadow: 0 10px 30px rgba(0,0,0,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
  }

  .page {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
  }

  .top {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .drop-area {
    width: min(100%, 720px);
    border: 2px dashed #cfe0ea;
    border-radius: 14px;
    padding: 28px;
    background: var(--soft);
    cursor: pointer;
    transition: 0.15s ease;
    display: inline-block;
  }
  .drop-area:hover,
  .drop-area.drag-over {
    border-color: var(--accent);
    background: #dbeef8;
  }

  .drop-area input { display: none; }

  .drop-title {
    font-weight: 700;
    color: var(--title);
    font-size: 1.05rem;
    margin-bottom: 6px;
  }
  .drop-sub {
    font-size: 0.92rem;
    color: #4f6780;
  }

  .actions {
    display: flex;
    gap: 12px;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 11px 18px;
    background: var(--title);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s ease;
  }
  .btn:hover {
    transform: translateY(-1px);
    background: var(--accent-2);
  }
  .btn:disabled {
    opacity: 0.35;
    cursor: default;
    transform: none;
  }

  .log {
    padding: 12px;
    background: #ffffff;
    border: 1px solid #dbe9f3;
    border-radius: 10px;
    font-family: 'Segoe UI', monospace;
    font-size: 12px;
    color: #37566f;
    max-height: 100px;
    overflow: auto;
    white-space: pre-wrap;
  }

  .viewport {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 0;
    border-radius: 12px;
    overflow: hidden;
    touch-action: none;
    background: radial-gradient(circle at center, #ffffff 0%, #eaf7ff 52%, #d5efff 100%);
    border: 1px solid #dbe9f3;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .empty-card {
    background: rgba(255,255,255,0.88);
    border: 1px solid #dbe9f3;
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    max-width: 320px;
  }
  .empty-card strong {
    display: block;
    color: var(--title);
    margin-bottom: 6px;
    font-size: 1.05rem;
  }
  .empty-card span {
    color: #4f6780;
    font-size: 0.92rem;
  }
</style>
</head>
<body>

<div class="page">
  <div class="top">
    <div class="drop-area" id="dropArea">
      <input type="file" id="fileInput" accept=".ifc,application/octet-stream" />
      <div class="drop-title">Drop .ifc here or click to upload</div>
      <div class="drop-sub">Upload your IFC file to the backend</div>
    </div>

    <div class="actions">
      <button class="btn" id="btnDownload">Download JSON</button>
    </div>

    <div class="log" id="log">Ready.</div>
  </div>

  <div class="viewport" id="viewport">
    <canvas id="canvas"></canvas>
    <div class="empty" id="empty">
      <div class="empty-card">
        <strong>No model</strong>
        <span>Upload an IFC file to see the 3D model.</span>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const viewport = document.getElementById("viewport");
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const btnDownload = document.getElementById("btnDownload");
const logEl = document.getElementById("log");

const BACKEND = "https://ifcjsonbackend-production.up.railway.app/convert-ifc";

let jsonText = null;
let modelGroup = new THREE.Group();

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(viewport.clientWidth, viewport.clientHeight, false);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeaf7ff);

const camera = new THREE.PerspectiveCamera(60, viewport.clientWidth / viewport.clientHeight, 0.1, 10000);
camera.position.set(10, 10, 10);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.PAN
};
controls.touches = {
  ONE: THREE.TOUCH.ROTATE,
  TWO: THREE.TOUCH.DOLLY_PAN
};
controls.screenSpacePanning = true;
controls.minDistance = 0.1;
controls.maxDistance = 5000;

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(20, 40, 20);
scene.add(light);

const grid = new THREE.GridHelper(100, 100, 0x78a6c8, 0xc5dce9);
scene.add(grid);
scene.add(modelGroup);

function fitCameraToObject(object) {
  const box = new THREE.Box3().setFromObject(object);
  if (box.isEmpty()) return;

  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);

  const fov = camera.fov * (Math.PI / 180);
  const distance = (maxDim / 2) / Math.tan(fov / 2);

  camera.position.set(
    center.x + distance * 0.8,
    center.y + distance * 0.6,
    center.z + distance * 0.8
  );

  controls.target.copy(center);
  controls.update();
}

function resize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

function log(msg) {
  logEl.textContent += `\n${msg}`;
  logEl.scrollTop = logEl.scrollHeight;
}

function loadDemo() {
  modelGroup.clear();
  const geo = new THREE.BoxGeometry(1, 1, 1);
  const mat = new THREE.MeshStandardMaterial({ color: 0x1890ff });
  const cube = new THREE.Mesh(geo, mat);
  modelGroup.add(cube);
  fitCameraToObject(modelGroup);
  empty.style.display = "none";
  jsonText = JSON.stringify({ demo: true, name: "demo-box" }, null, 2);
  btnDownload.disabled = false;
  log("Demo cube loaded and centered.");
}

function uploadFile(file) {
  const form = new FormData();
  form.append("file", file, file.name);

  log(`Uploading: ${file.name}`);

  fetch(BACKEND, { method: "POST", body: form })
    .then(res => {
      log(`Response status: ${res.status} ${res.statusText}`);
      if (!res.ok) {
        throw new Error(`File upload failed: ${res.status} ${res.statusText}`);
      }
      return res.json();
    })
    .then(json => {
      jsonText = JSON.stringify(json, null, 2);
      modelGroup.clear();
      const geo = new THREE.BoxGeometry(1, 1, 1);
      const mat = new THREE.MeshStandardMaterial({ color: 0x1890ff });
      const cube = new THREE.Mesh(geo, mat);
      modelGroup.add(cube);
      fitCameraToObject(modelGroup);
      empty.style.display = "none";
      btnDownload.disabled = false;
      log("Upload successful. JSON ready for download.");
    })
    .catch(err => {
      log("Upload error: " + err.message);
      console.error(err);
    });
}

dropArea.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", e => {
  const file = e.target.files?.[0];
  if (file) uploadFile(file);
  fileInput.value = "";
});

dropArea.addEventListener("dragover", e => {
  e.preventDefault();
  dropArea.classList.add("drag-over");
});
dropArea.addEventListener("dragleave", e => {
  e.preventDefault();
  dropArea.classList.remove("drag-over");
});
dropArea.addEventListener("drop", e => {
  e.preventDefault();
  dropArea.classList.remove("drag-over");
  const file = e.dataTransfer?.files?.[0];
  if (file) uploadFile(file);
});

btnDownload.addEventListener("click", () => {
  if (!jsonText) {
    log("No JSON yet. Upload an IFC file first.");
    return;
  }
  const blob = new Blob([jsonText], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ifc.json";
  a.click();
  URL.revokeObjectURL(url);
  log("JSON downloaded.");
});

// Load demo on start so you can see the 3D viewer working
loadDemo();
</script>
</body>
</html>
