<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM · IFC Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
/* (keep ALL your existing CSS unchanged — omitted here for brevity) */

html, body { height: 100%; margin: 0; overflow: hidden; }

.viewport {
  flex: 1;
  position: relative;
  overflow: hidden;
  touch-action: none; /* 🔥 IMPORTANT FIX */
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none; /* 🔥 IMPORTANT FIX */
}
</style>
</head>

<body>

<!-- (keep your full UI unchanged) -->

<main>
  <aside class="panel">
    <!-- unchanged -->
  </aside>

  <section class="viewport" id="viewport">
    <canvas id="canvas"></canvas>
  </section>
</main>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.128/examples/jsm/controls/OrbitControls.js";

/* -----------------------------
   BASIC SETUP
------------------------------ */

const canvas = document.getElementById("canvas");
const viewport = document.getElementById("viewport");

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(viewport.clientWidth, viewport.clientHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1118);

const camera = new THREE.PerspectiveCamera(
  60,
  viewport.clientWidth / viewport.clientHeight,
  0.1,
  10000
);

camera.position.set(10, 10, 10);

const controls = new OrbitControls(camera, renderer.domElement);

/* 🔥 CRITICAL FIX: proper interaction */
controls.enableDamping = true;
controls.dampingFactor = 0.08;

controls.enableZoom = true;
controls.enablePan = true;
controls.enableRotate = true;

/* mouse buttons (fixes “can’t move properly”) */
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.PAN
};

/* touch support */
controls.touches = {
  ONE: THREE.TOUCH.ROTATE,
  TWO: THREE.TOUCH.DOLLY_PAN
};

controls.screenSpacePanning = true;
controls.minDistance = 0.1;
controls.maxDistance = 5000;

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20, 40, 20);
scene.add(light);

/* GRID */
const grid = new THREE.GridHelper(100, 100, 0x34506d, 0x1a2633);
scene.add(grid);

/* MODEL ROOT */
const modelGroup = new THREE.Group();
scene.add(modelGroup);

/* -----------------------------
   FIXED RESIZE
------------------------------ */
function resize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;

  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

/* -----------------------------
   ANIMATION LOOP
------------------------------ */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* -----------------------------
   IMPORTANT FIX: FIT CAMERA
------------------------------ */
function fitCamera() {
  const box = new THREE.Box3().setFromObject(modelGroup);

  if (box.isEmpty()) return;

  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * Math.PI / 180;

  let distance = maxDim / (2 * Math.tan(fov / 2));
  distance *= 1.5;

  camera.position.set(
    center.x + distance,
    center.y + distance,
    center.z + distance
  );

  controls.target.copy(center);
  controls.update();
}

/* -----------------------------
   TEMP DEMO OBJECT (REMOVE WHEN IFC LOADED)
------------------------------ */
const testGeo = new THREE.BoxGeometry(1, 1, 1);
const testMat = new THREE.MeshStandardMaterial({ color: 0x58a6ff });
const cube = new THREE.Mesh(testGeo, testMat);
modelGroup.add(cube);

fitCamera();

</script>

</body>
</html>
