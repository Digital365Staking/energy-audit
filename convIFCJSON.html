<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM · CAD Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
:root {
  --bg:#b0e2ff;
  --card:#fff;
  --ink:#1a1a1a;
  --title:#0b3c5d;
  --accent:#1890ff;
  --accent-2:#1d6fa5;
  --soft:#e6f7ff;
  --shadow:0 10px 30px rgba(0,0,0,0.10);
}

*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Segoe UI;}

/* =========================
   ROOT LAYOUT SWITCH
========================= */
.page{
  width:100%;
  height:100%;
}

/* =========================
   🖥 DESKTOP VIEW (DEFAULT)
========================= */
.desktop-layout{
  display:flex;
  gap:14px;
  padding:16px;
  height:100%;
}

.panel{
  width:300px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.viewport{
  flex:1;
  position:relative;
  border-radius:16px;
  overflow:hidden;
  background:radial-gradient(circle at 50% 40%,#fff 0%,#eaf7ff 55%,#d5efff 100%);
  border:1px solid #c8e0ef;
  box-shadow:var(--shadow);
}

canvas{width:100%;height:100%;display:block;touch-action:none;}

/* =========================
   📱 MOBILE VIEW (NEW UI)
========================= */
.mobile-layout{
  display:none;
  flex-direction:column;
  height:100%;
}

/* Fullscreen BIM viewport */
.mobile-viewport{
  flex:1;
  position:relative;
  background:#eaf7ff;
}

/* Top bar */
.mobile-topbar{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  z-index:50;
}

.mobile-btn{
  background:var(--title);
  color:#fff;
  border:none;
  padding:10px 12px;
  border-radius:12px;
  font-weight:700;
  box-shadow:var(--shadow);
}

/* Bottom action bar */
.mobile-actions{
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:50;
}

.mobile-actions button{
  background:var(--title);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:12px;
  font-weight:700;
}

/* Slide panel */
.mobile-sheet{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  max-height:60%;
  background:#fff;
  border-top-left-radius:16px;
  border-top-right-radius:16px;
  box-shadow:0 -10px 30px rgba(0,0,0,0.15);
  transform:translateY(100%);
  transition:.25s;
  display:flex;
  flex-direction:column;
  z-index:60;
}

.mobile-sheet.open{
  transform:translateY(0);
}

.sheet-header{
  padding:10px;
  font-weight:700;
  text-align:center;
  border-bottom:1px solid #e5eef6;
}

.sheet-content{
  padding:12px;
  overflow:auto;
}

/* =========================
   RESPONSIVE SWITCH
========================= */
@media (max-width:768px){

  .desktop-layout{display:none;}
  .mobile-layout{display:flex;}

}

/* =========================
   YOUR ORIGINAL CSS GOES HERE
   (UNCHANGED)
========================= */
/* KEEP ALL YOUR EXISTING PANEL / THREE / UI STYLES BELOW */
</style>
</head>

<body>

<div class="page">

  <!-- =========================
       🖥 DESKTOP (EXACT ORIGINAL)
  ========================== -->
  <div class="desktop-layout">

    <aside class="panel">
      <!-- 🔥 YOUR ORIGINAL LEFT PANEL HTML UNCHANGED -->
    </aside>

    <section class="viewport" id="viewport">
      <canvas id="canvas"></canvas>

      <!-- your original popups / HUD -->
      <div class="empty-state" id="emptyState"></div>
      <div class="detail-popup" id="detailPopup"></div>
      <div class="hud" id="hud"></div>

    </section>

  </div>

  <!-- =========================
       📱 MOBILE (NEW BIM UX)
  ========================== -->
  <div class="mobile-layout">

    <div class="mobile-viewport" id="mobileViewport">
      <canvas id="canvasMobile"></canvas>

      <div class="mobile-topbar">
        <button class="mobile-btn" id="mMenu">☰</button>
        <button class="mobile-btn" id="mFit">Fit</button>
      </div>

      <div class="mobile-actions">
        <button id="mUpload">Upload</button>
        <button id="mReset">Reset</button>
      </div>

      <div class="mobile-sheet" id="mobileSheet">
        <div class="sheet-header">BIM Controls</div>
        <div class="sheet-content">

          <!-- reuse SAME panel logically (JS can inject or simplify) -->
          <div id="mobilePanel"></div>

        </div>
      </div>

      <div class="empty-state" id="emptyStateMobile"></div>
      <div class="detail-popup" id="detailPopupMobile"></div>

    </div>

  </div>

</div>

<script>
/* =========================
   VIEW DETECTION
========================= */
const isMobile = window.matchMedia("(max-width:768px)").matches;

/* =========================
   UI SWITCH LOGIC
========================= */
if (isMobile) {

  document.getElementById("mMenu").onclick = () => {
    document.getElementById("mobileSheet").classList.toggle("open");
  };

  document.getElementById("mFit").onclick = () => {
    document.getElementById("btnFit")?.click();
  };

  document.getElementById("mUpload").onclick = () => {
    document.getElementById("fileInput")?.click();
  };

  document.getElementById("mReset").onclick = () => {
    document.getElementById("btnReset")?.click();
  };
}

/* =========================
   IMPORTANT ARCHITECTURE NOTE
========================= */
/*
  - Desktop uses: canvas + full panel + full UI (UNCHANGED)
  - Mobile uses: separate canvas + simplified UI
  - THREE.js must detect which canvas to bind:

    const canvas = isMobile
      ? document.getElementById("canvasMobile")
      : document.getElementById("canvas");

*/

/* =========================
   YOUR FULL THREE.JS ENGINE
   (UNCHANGED — ONLY ADAPT CANVAS TARGET)
========================= */

/* EXAMPLE ONLY:
const canvas = isMobile
  ? document.getElementById("canvasMobile")
  : document.getElementById("canvas");

const renderer = new THREE.WebGLRenderer({ canvas });
*/

</script>

</body>
</html>
