<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM · Adaptive Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
:root {
  --bg:#b0e2ff;
  --card:#fff;
  --ink:#1a1a1a;
  --title:#0b3c5d;
  --accent:#1890ff;
  --accent2:#1d6fa5;
  --soft:#eaf7ff;
  --line:rgba(11,60,93,.12);
  --shadow:0 10px 30px rgba(0,0,0,.10);
}

*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}

body{
  font-family:system-ui,Segoe UI;
  background:var(--bg);
  display:flex;
  flex-direction:column;
}

/* =========================
   DESKTOP LAYOUT
========================= */
.page{
  display:flex;
  width:100%;
  height:100%;
  gap:12px;
  padding:14px;
}

.panel{
  width:320px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.viewport{
  flex:1;
  position:relative;
  border-radius:16px;
  overflow:hidden;
  background:radial-gradient(circle,#fff,#dff3ff);
  box-shadow:var(--shadow);
}

canvas{width:100%;height:100%;display:block}

/* =========================
   UI ELEMENTS (desktop)
========================= */

.drop-area{
  border:2px dashed #99cee8;
  border-radius:14px;
  padding:16px;
  background:#fff;
  text-align:center;
  cursor:pointer;
}

.btn-row{display:flex;gap:8px}
.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--title);
  color:#fff;
  font-weight:700;
}

.btn.secondary{
  background:#fff;
  color:var(--title);
  border:1px solid #cfe3f3;
}

.status{
  font-size:.8rem;
  font-weight:700;
  color:#1d6fa5;
  background:#d7eef9;
  padding:4px 10px;
  border-radius:20px;
  display:inline-block;
}

/* log / stats (desktop only) */
.log-wrap{
  flex:1;
  background:#fff;
  border:1px solid #dbe9f3;
  border-radius:10px;
  overflow:auto;
  font-size:.8rem;
}

.stats{
  background:#fff;
  border:1px solid #dbe9f3;
  border-radius:10px;
  padding:10px;
  font-size:.8rem;
}

/* popup */
.detail-popup{
  position:absolute;
  top:10px;
  left:10px;
  width:420px;
  background:#fff;
  border-radius:12px;
  box-shadow:var(--shadow);
  display:none;
  flex-direction:column;
  z-index:10;
}

.detail-popup.visible{display:flex}
.detail-header{
  background:linear-gradient(135deg,var(--title),var(--accent2));
  color:#fff;
  padding:10px;
}
.detail-body{padding:10px;font-size:.8rem}

/* =========================
   MOBILE ADAPTATION
========================= */
@media (max-width:768px){

  .page{
    flex-direction:column;
    padding:0;
    gap:0;
  }

  .panel{
    width:100%;
    flex-direction:row;
    flex-wrap:wrap;
    padding:8px;
  }

  .viewport{
    border-radius:0;
    height:calc(100vh - 170px);
  }

  /* reduce noise */
  .log-wrap,
  .stats{
    display:none;
  }

  .drop-area{
    flex:1 1 100%;
    padding:12px;
  }

  .btn-row{
    width:100%;
  }

  .btn{
    font-size:.75rem;
    padding:8px;
  }

  .status{
    font-size:.7rem;
  }

  /* popup becomes bottom sheet */
  .detail-popup{
    top:auto;
    left:0;
    bottom:0;
    width:100%;
    border-radius:16px 16px 0 0;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- PANEL -->
  <aside class="panel">

    <div class="drop-area" id="drop">
      Drop / Upload BIM file
      <input type="file" id="file" hidden />
    </div>

    <div class="btn-row">
      <button class="btn" id="fit">Fit</button>
      <button class="btn secondary" id="reset">Reset</button>
    </div>

    <div class="status" id="status">IDLE</div>

    <div class="stats" id="stats">No data</div>

    <div class="log-wrap" id="log"></div>

  </aside>

  <!-- VIEWPORT -->
  <section class="viewport">
    <canvas id="c"></canvas>

    <div class="detail-popup" id="popup">
      <div class="detail-header" id="pTitle">Element</div>
      <div class="detail-body" id="pBody"></div>
    </div>
  </section>

</div>

<script>

/* =========================
   THREE SETUP
========================= */
const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(devicePixelRatio);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeaf7ff);

const camera = new THREE.PerspectiveCamera(60,1,0.1,10000);
camera.position.set(8,8,8);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,1));

const group = new THREE.Group();
scene.add(group);

/* resize */
function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
addEventListener("resize",resize);
resize();

(function loop(){
  requestAnimationFrame(loop);
  controls.update();
  renderer.render(scene,camera);
})();

/* =========================
   RESPONSIVE FLAG
========================= */
function isMobile(){
  return window.matchMedia("(max-width:768px)").matches;
}

/* =========================
   CAMERA FIT (adaptive)
========================= */
function fit(){
  const box = new THREE.Box3().setFromObject(group);
  if(box.isEmpty()) return;

  const size = box.getSize(new THREE.Vector3());
  const max = Math.max(size.x,size.y,size.z);

  const scale = isMobile() ? 2.2 : 1.7;

  const dist = (max/(2*Math.tan(camera.fov*Math.PI/360)))*scale;

  const center = box.getCenter(new THREE.Vector3());

  camera.position.set(center.x+dist,center.y+dist,center.z+dist);
  controls.target.copy(center);
}

/* =========================
   SIMPLE MOCK LOADER
========================= */
function log(msg){
  document.getElementById("log").innerHTML += msg+"<br>";
}

function loadMock(){
  const geo = new THREE.BoxGeometry(1,1,1);
  const mat = new THREE.MeshStandardMaterial({color:0x1890ff});
  const mesh = new THREE.Mesh(geo,mat);
  group.add(mesh);
  log("Loaded mock model");
}

/* =========================
   UI EVENTS
========================= */
document.getElementById("fit").onclick=fit;

document.getElementById("reset").onclick=()=>{
  group.clear();
  log("Reset");
};

document.getElementById("drop").onclick=()=>{
  document.getElementById("file").click();
};

document.getElementById("file").onchange=(e)=>{
  document.getElementById("status").innerText="LOADING";
  loadMock();
  fit();
  document.getElementById("status").innerText="READY";
};

/* =========================
   SELECTION POPUP (adaptive)
========================= */
window.addEventListener("click",(e)=>{
  document.getElementById("popup").classList.remove("visible");
});

</script>

</body>
</html>
