<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM · IFC Viewer</title>

<style>
body { margin:0; overflow:hidden; font-family:system-ui; background:#0D1117; color:white; }
header { padding:10px 14px; background:#161B22; border-bottom:1px solid #21262D; }
main { display:flex; height:calc(100vh - 50px); }

.panel {
  width:320px;
  background:#161B22;
  border-right:1px solid #21262D;
  display:flex;
  flex-direction:column;
}

.dropzone {
  margin:10px;
  padding:20px;
  border:1px dashed #444;
  text-align:center;
  cursor:pointer;
}

button {
  margin:10px;
  padding:10px;
  background:#21262D;
  color:white;
  border:1px solid #333;
  cursor:pointer;
}

button:disabled { opacity:0.5; cursor:not-allowed; }

#log {
  flex:1;
  margin:10px;
  font-size:12px;
  overflow:auto;
  white-space:pre-wrap;
}

.viewport { flex:1; }
canvas { width:100%; height:100%; display:block; }
</style>
</head>

<body>

<header>
  <b>FullBIM IFC Viewer (Backend Geometry Enabled)</b>
</header>

<main>

<!-- LEFT PANEL -->
<div class="panel">

  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept=".ifc" hidden />
    Drop IFC or click
  </div>

  <button id="btnDownload" disabled>Download JSON</button>
  <button id="btnReset" disabled>Reset</button>

  <div id="log"></div>
</div>

<!-- VIEWPORT -->
<div class="viewport">
  <canvas id="canvas"></canvas>
</div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let currentJson = null;
let currentJsonStr = null;

const log = (m) => {
  document.getElementById("log").textContent += m + "\n";
};

function setEnabled(v){
  document.getElementById("btnDownload").disabled = !v;
  document.getElementById("btnReset").disabled = !v;
}

/* ----------------------------
   THREE.JS INIT
-----------------------------*/
function init3D(){

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0D1117);

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    100000
  );

  camera.position.set(10,10,10);

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("canvas"),
    antialias:true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);

  // LIGHTS (VERY IMPORTANT)
  const light1 = new THREE.DirectionalLight(0xffffff, 1);
  light1.position.set(10,20,10);
  scene.add(light1);

  const light2 = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(light2);

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

/* ----------------------------
   GEOMETRY BUILDER
-----------------------------*/
function buildMesh(el){

  if(!el.geometry) return null;

  const geo = new THREE.BufferGeometry();

  const vertices = new Float32Array(el.geometry.vertices.flat());
  const indices = new Uint32Array(el.geometry.indices);

  geo.setAttribute(
    "position",
    new THREE.BufferAttribute(vertices, 3)
  );

  geo.setIndex(new THREE.BufferAttribute(indices, 1));
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color: 0x58A6FF,
    metalness: 0.1,
    roughness: 0.8
  });

  const mesh = new THREE.Mesh(geo, mat);

  mesh.userData = el;

  return mesh;
}

/* ----------------------------
   CENTER MODEL (IMPORTANT FIX)
-----------------------------*/
function centerModel(){

  const box = new THREE.Box3().setFromObject(scene);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  scene.position.sub(center);

  const max = Math.max(size.x, size.y, size.z);

  camera.position.set(max, max, max);
  camera.lookAt(0,0,0);
}

/* ----------------------------
   RENDER IFC DATA
-----------------------------*/
function render(data){

  // clear scene but keep lights
  scene.children = scene.children.filter(o =>
    o.isLight
  );

  let count = 0;

  data.forEach(el => {

    const mesh = buildMesh(el);

    if(mesh){
      scene.add(mesh);
      count++;
    }
  });

  log("3D meshes: " + count);

  centerModel();
}

/* ----------------------------
   BACKEND CALL
-----------------------------*/
async function upload(file){

  log("Uploading IFC...");

  const fd = new FormData();
  fd.append("file", file);

  try {

    const res = await fetch(
      "https://ifcjsonbackend-production.up.railway.app/convert-ifc",
      { method:"POST", body:fd }
    );

    if(!res.ok) throw new Error(await res.text());

    const json = await res.json();

    currentJson = json;
    currentJsonStr = JSON.stringify(json,null,2);

    log("Success");
    log("Entities: " + json.data.length);
    log("Geometry count: " + json.geometryCount);

    render(json.data);

    setEnabled(true);

  } catch(e){
    log("ERROR: " + e.message);
    setEnabled(false);
  }
}

/* ----------------------------
   EVENTS
-----------------------------*/
document.getElementById("dropzone").onclick = () =>
  document.getElementById("fileInput").click();

document.getElementById("fileInput").onchange = (e)=>{
  if(e.target.files[0]) upload(e.target.files[0]);
};

document.getElementById("btnDownload").onclick = () => {
  const blob = new Blob([currentJsonStr], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ifc.json";
  a.click();
};

document.getElementById("btnReset").onclick = () => {
  scene.clear();
  init3D();
  setEnabled(false);
  document.getElementById("log").textContent = "";
};

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ----------------------------
   INIT
-----------------------------*/
init3D();
</script>

</body>
</html>
