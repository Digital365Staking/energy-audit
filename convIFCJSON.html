<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let currentJson = null;
let currentJsonStr = null;

let scene, camera, renderer, controls;

const log = (msg) => {
  document.getElementById("log").textContent += msg + "\n";
};

function setEnabled(state){
  document.getElementById("btnDownload").disabled = !state;
  document.getElementById("btnReset").disabled = !state;
}

/* -----------------------------
   THREE.JS INIT
------------------------------*/
function init3D(){
  const canvas = document.getElementById("canvas");

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0D1117);

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    10000
  );

  camera.position.set(10, 10, 10);

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(10, 20, 10);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

/* -----------------------------
   CONVERT BACKEND → 3D
------------------------------*/
function buildGeometry(element){

  if(!element.geometry) return null;

  const geo = new THREE.BufferGeometry();

  const vertices = new Float32Array(element.geometry.vertices.flat());
  const indices = new Uint32Array(element.geometry.indices);

  geo.setAttribute(
    "position",
    new THREE.BufferAttribute(vertices, 3)
  );

  geo.setIndex(new THREE.BufferAttribute(indices, 1));
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color: 0x58A6FF,
    metalness: 0.1,
    roughness: 0.8
  });

  const mesh = new THREE.Mesh(geo, mat);

  mesh.userData = element;

  return mesh;
}

function renderScene(data){

  // clear previous
  scene.clear();

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(10, 20, 10);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));

  let count = 0;

  data.forEach(el => {

    const mesh = buildGeometry(el);

    if(mesh){
      scene.add(mesh);
      count++;
    }
  });

  log("3D objects rendered: " + count);
}

/* -----------------------------
   BACKEND CALL
------------------------------*/
async function loadIFCFile(file){
  log("Uploading IFC to backend...");

  try {
    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch(
      "https://ifcjsonbackend-production.up.railway.app/convert-ifc",
      {
        method: "POST",
        body: formData
      }
    );

    if (!res.ok) throw new Error(await res.text());

    const data = await res.json();

    currentJson = data;
    currentJsonStr = JSON.stringify(data, null, 2);

    log("Backend success");
    log("Entities: " + data.data.length);
    log("Geometry: " + (data.geometryCount || 0));

    // 🚀 RENDER 3D
    renderScene(data.data);

    setEnabled(true);

  } catch (err) {

    log("Backend failed: " + err.message);

    setEnabled(false);
  }
}

/* -----------------------------
   EVENTS
------------------------------*/
document.getElementById("fileInput").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if(file) loadIFCFile(file);
});

document.getElementById("dropzone").addEventListener("click", ()=>{
  document.getElementById("fileInput").click();
});

document.getElementById("btnDownload").onclick = () => {
  const blob = new Blob([currentJsonStr], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ifc.json";
  a.click();
};

document.getElementById("btnReset").onclick = () => {
  currentJson = null;
  currentJsonStr = null;
  scene.clear();
  setEnabled(false);
  document.getElementById("log").textContent = "";
};

/* -----------------------------
   INIT
------------------------------*/
init3D();
</script>
