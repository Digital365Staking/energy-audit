<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullBIM · IFC Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
  :root {
    --bg:       #b0e2ff;
    --card:     #ffffff;
    --ink:      #1a1a1a;
    --title:    #0b3c5d;
    --accent:   #1890ff;
    --accent-2: #1d6fa5;
    --soft:     #e6f7ff;
    --line:     rgba(11,60,93,0.12);
    --shadow:   0 10px 30px rgba(0,0,0,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { width:100%; height:100%; margin:0; overflow:hidden; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
  }

  .page {
    display: flex;
    width: 100%;
    height: 100%;
    gap: 14px;
    padding: 16px;
  }

  /* ── PANEL ── */
  .panel {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
  }

  /* ── DROP AREA ── */
  .drop-area {
    border: 2px dashed #99cee8;
    border-radius: 14px;
    padding: 24px 16px;
    background: var(--soft);
    cursor: pointer;
    transition: .15s ease;
    text-align: center;
    user-select: none;
    flex-shrink: 0;
  }
  .drop-area:hover, .drop-area.drag-over {
    border-color: var(--accent);
    background: #d7eef9;
    transform: translateY(-1px);
  }
  .drop-area input { display: none; }
  .drop-icon  { font-size: 2rem; color: var(--accent-2); margin-bottom: 8px; }
  .drop-title { font-weight: 700; color: var(--title); font-size: 1rem; margin-bottom: 4px; }
  .drop-sub   { font-size: .88rem; color: #4f6780; line-height: 1.45; }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 8px; flex-shrink: 0; }
  .btn {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 10px 10px;
    background: var(--title);
    color: #fff;
    font-weight: 700;
    font-size: .82rem;
    cursor: pointer;
    transition: .2s ease;
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) { background: var(--accent-2); transform: translateY(-1px); }
  .btn:disabled { opacity: .35; cursor: default; transform: none; }
  .btn.secondary {
    background: transparent;
    color: var(--title);
    border: 2px solid rgba(11,60,93,0.2);
  }
  .btn.secondary:hover:not(:disabled) { background: var(--soft); border-color: var(--accent-2); }

  /* ── STATUS BADGE ── */
  .status-badge {
    display: inline-block;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: #e0eef8;
    color: #4f6780;
    align-self: flex-start;
    flex-shrink: 0;
  }
  .status-badge.ready   { background: #d4f4e6; color: #1a7a4a; }
  .status-badge.loading { background: #fff3cd; color: #7a5800; }
  .status-badge.error   { background: #fde8e8; color: #9b1c1c; }

  /* ── PROGRESS ── */
  .progress-wrap { height: 4px; background: #c8e0ef; border-radius: 2px; overflow: hidden; display: none; flex-shrink: 0; }
  .progress-wrap.active { display: block; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 40%;
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(350%); } }

  /* ── STATS ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
  .stat-cell { background: var(--soft); border: 1px solid #c8e0ef; border-radius: 10px; padding: 10px 12px; }
  .stat-value { font-size: 1.35rem; font-weight: 800; color: var(--title); line-height: 1; }
  .stat-key   { font-size: .78rem; color: #4f6780; text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }

  /* ── ERROR BANNER ── */
  .err-banner { display: none; background: #fde8e8; border: 1px solid #f5a3a3; border-radius: 10px; padding: 10px 12px; font-size: .83rem; color: #9b1c1c; white-space: pre-wrap; line-height: 1.5; flex-shrink: 0; }
  .err-banner.visible { display: block; }

  /* ── LOG ── */
  .log-wrap { flex: 1; min-height: 0; background: var(--card); border: 1px solid #dbe9f3; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .log-header { padding: 8px 12px; font-size: .78rem; font-weight: 700; color: var(--title); text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid #edf4fa; background: #f5fbff; flex-shrink: 0; }
  #log { flex: 1; overflow-y: auto; padding: 10px 12px; font-family: 'Courier New', monospace; font-size: .8rem; color: #37566f; line-height: 1.7; scrollbar-width: thin; scrollbar-color: #99cee8 transparent; }
  #log .ok   { color: #1a7a4a; }
  #log .err  { color: #9b1c1c; }
  #log .warn { color: #7a5800; }
  #log .info { color: var(--accent-2); }

  /* ── VIEWPORT ── */
  .viewport {
    flex: 1; min-width: 0;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: radial-gradient(circle at 50% 40%, #ffffff 0%, #eaf7ff 55%, #d5efff 100%);
    border: 1px solid #c8e0ef;
    box-shadow: var(--shadow);
    touch-action: none;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* ── EMPTY STATE ── */
  .empty-state { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .empty-state.hidden { display: none; }
  .empty-card { background: rgba(255,255,255,0.88); border: 1px solid #dbe9f3; border-radius: 14px; padding: 22px 28px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
  .empty-icon  { font-size: 2.2rem; margin-bottom: 8px; }
  .empty-title { font-weight: 700; color: var(--title); font-size: 1.05rem; margin-bottom: 6px; }
  .empty-hint  { color: #4f6780; font-size: .88rem; }

  /* ── HUD ── */
  .hud { position: absolute; bottom: 14px; right: 14px; font-size: .75rem; background: rgba(255,255,255,0.72); border: 1px solid #c8e0ef; border-radius: 10px; padding: 8px 12px; backdrop-filter: blur(8px); color: #4f6780; line-height: 1.9; pointer-events: none; }
  .hud-key { color: var(--accent-2); font-weight: 700; }

  /* ── ELEMENT DETAIL POPUP ── */
  .detail-popup {
    position: absolute;
    top: 14px;
    left: 14px;
    width: 280px;
    max-height: calc(100% - 28px);
    background: rgba(255,255,255,0.97);
    border: 1px solid #c8e0ef;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(11,60,93,0.22);
    backdrop-filter: blur(6px);
    overflow: hidden;
    display: none;
    flex-direction: column;
    z-index: 20;
  }
  .detail-popup.visible { display: flex; }
  .detail-popup-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    padding: 14px 14px 10px 16px;
    background: linear-gradient(135deg, var(--title), var(--accent-2));
    color: #fff;
  }
  .detail-popup-title {
    font-weight: 700;
    font-size: 0.98rem;
    word-break: break-word;
    line-height: 1.35;
  }
  .detail-popup-type {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: .07em;
    opacity: 0.85;
    margin-top: 2px;
  }
  .detail-popup-close {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.18);
    color: #fff;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s ease, transform .15s ease;
  }
  .detail-popup-close:hover {
    background: rgba(255,255,255,0.32);
    transform: scale(1.08);
  }
  .detail-popup-body {
    padding: 12px 16px 16px;
    overflow-y: auto;
    font-size: 0.84rem;
    color: #2c4357;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #edf4fa;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-key {
    color: #6f879a;
    font-weight: 600;
    flex-shrink: 0;
    font-size: 0.76rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    padding-top: 1px;
  }
  .detail-val {
    text-align: right;
    word-break: break-word;
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    color: var(--title);
  }
  .detail-props-title {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 2px solid #edf4fa;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: #6f879a;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="page">

  <!-- ── LEFT PANEL ── -->
  <aside class="panel">

    <div class="drop-area" id="dropArea">
      <input type="file" id="fileInput" accept=".ifc,application/octet-stream" />
      <div class="drop-icon">⬡</div>
      <div class="drop-title">Drop .ifc or click to upload</div>
      <div class="drop-sub">Sends to backend · renders real geometry</div>
    </div>

    <div class="progress-wrap" id="progressWrap"><div class="progress-bar"></div></div>

    <div class="btn-row">
      <button class="btn" id="btnDownload" disabled>↓ JSON</button>
      <button class="btn secondary" id="btnFit" disabled>⊡ Fit</button>
      <button class="btn secondary" id="btnReset" disabled>✕</button>
    </div>

    <div id="statusBadge" class="status-badge">IDLE</div>

    <div id="statsBlock" style="display:none">
      <div class="stats-grid">
        <div class="stat-cell"><div class="stat-value" id="statEntities">—</div><div class="stat-key">Entities</div></div>
        <div class="stat-cell"><div class="stat-value" id="statMeshes">—</div><div class="stat-key">Meshes</div></div>
        <div class="stat-cell"><div class="stat-value" id="statVerts">—</div><div class="stat-key">Verts</div></div>
        <div class="stat-cell"><div class="stat-value" id="statTris">—</div><div class="stat-key">Tris</div></div>
      </div>
    </div>

    <div class="err-banner" id="errBanner"></div>

    <div class="log-wrap">
      <div class="log-header">Console</div>
      <div id="log"></div>
    </div>

  </aside>

  <!-- ── 3D VIEWPORT ── -->
  <section class="viewport" id="viewport">
    <canvas id="canvas"></canvas>

    <div class="empty-state" id="emptyState">
      <div class="empty-card">
        <div class="empty-icon">🏗</div>
        <div class="empty-title">No model loaded</div>
        <div class="empty-hint">Drop an .ifc file to begin</div>
      </div>
    </div>

    <!-- Element detail popup -->
    <div class="detail-popup" id="detailPopup">
      <div class="detail-popup-header">
        <div>
          <div class="detail-popup-title" id="detailTitle">—</div>
          <div class="detail-popup-type" id="detailType">—</div>
        </div>
        <button class="detail-popup-close" id="detailClose" title="Close" aria-label="Close">✕</button>
      </div>
      <div class="detail-popup-body" id="detailBody"></div>
    </div>

    <div class="hud" id="hud" style="display:none">
      <div><span class="hud-key">LMB </span>orbit (drag any direction)</div>
      <div><span class="hud-key">RMB </span>pan</div>
      <div><span class="hud-key">SCR </span>zoom</div>
      <div><span class="hud-key">CLICK </span>select element</div>
    </div>
  </section>

</div><!-- .page -->

<script>
/* ═══════════════════════════════════
   SCENE SETUP
═══════════════════════════════════ */
const canvas   = document.getElementById("canvas");
const viewport = document.getElementById("viewport");

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeaf7ff);

const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 10000);
camera.position.set(15, 12, 15);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping      = true;
controls.dampingFactor      = 0.08;
controls.screenSpacePanning = true;
controls.minDistance        = 0.01;
controls.maxDistance        = 5000;

/* Explicit, unrestricted orbit rotation in both axes.
   (azimuth = left/right, polar = up/down). Previously only
   vertical movement worked because nothing was actually wrong
   with mouseButtons, but to be safe we pin every relevant knob
   explicitly so left-right drag is guaranteed to rotate azimuth. */
controls.enableRotate    = true;
controls.enableZoom      = true;
controls.enablePan       = true;
controls.rotateSpeed     = 1.0;
controls.minPolarAngle   = 0;             // straight down
controls.maxPolarAngle   = Math.PI;       // straight up
controls.minAzimuthAngle = -Infinity;     // unlimited left/right spin
controls.maxAzimuthAngle = Infinity;

controls.mouseButtons = {
  LEFT:   THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT:  THREE.MOUSE.PAN
};
controls.touches = {
  ONE: THREE.TOUCH.ROTATE,
  TWO: THREE.TOUCH.DOLLY_PAN
};

/* Lights */
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(20, 40, 20);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x7ccfff, 0.3);
fill.position.set(-10, 5, -15);
scene.add(fill);

/* Grid */
const grid = new THREE.GridHelper(200, 200, 0x78a6c8, 0xc5dce9);
scene.add(grid);

/* Model group */
let modelGroup = new THREE.Group();
scene.add(modelGroup);

/* Resize */
function resize() {
  const w = viewport.clientWidth, h = viewport.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener("resize", resize);
new ResizeObserver(resize).observe(viewport);

/* Render loop */
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

/* ═══════════════════════════════════
   UI HELPERS
═══════════════════════════════════ */
const logEl      = document.getElementById("log");
const badgeEl    = document.getElementById("statusBadge");
const progressW  = document.getElementById("progressWrap");
const errBanner  = document.getElementById("errBanner");
const emptyState = document.getElementById("emptyState");
const hudEl      = document.getElementById("hud");

function log(msg, type) {
  const div = document.createElement("div");
  if (type) div.className = type;
  div.textContent = msg;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}
function setStatus(text, cls) {
  badgeEl.textContent = text;
  badgeEl.className = "status-badge " + (cls || "");
}
function setLoading(on) { progressW.classList.toggle("active", on); }
function setEnabled(on) {
  ["btnDownload","btnFit","btnReset"].forEach(id => {
    document.getElementById(id).disabled = !on;
  });
}
function showError(msg) { errBanner.textContent = msg; errBanner.classList.add("visible"); }
function hideError()    { errBanner.classList.remove("visible"); errBanner.textContent = ""; }
function fmt(n) {
  if (!Number.isFinite(n)) return "—";
  return n >= 1000 ? (n/1000).toFixed(1)+"k" : String(n);
}
function setStats(entities, meshes, verts, tris) {
  document.getElementById("statsBlock").style.display = "";
  document.getElementById("statEntities").textContent = fmt(entities);
  document.getElementById("statMeshes").textContent   = fmt(meshes);
  document.getElementById("statVerts").textContent    = fmt(verts);
  document.getElementById("statTris").textContent     = fmt(tris);
}

/* ═══════════════════════════════════
   ELEMENT DETAIL POPUP
═══════════════════════════════════ */
const detailPopup = document.getElementById("detailPopup");
const detailTitle = document.getElementById("detailTitle");
const detailType  = document.getElementById("detailType");
const detailBody  = document.getElementById("detailBody");
const detailClose = document.getElementById("detailClose");

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function buildDetailRow(key, val) {
  return `<div class="detail-row">
    <div class="detail-key">${escapeHtml(key)}</div>
    <div class="detail-val">${escapeHtml(val)}</div>
  </div>`;
}

function showDetailPopup(entity) {
  const props = entity.properties || {};
  const type  = props.ifc_type || entity.type || "UNKNOWN";
  const name  = entity.name || props.globalId || entity.id || "Unnamed element";

  detailTitle.textContent = name;
  detailType.textContent  = type;

  let html = "";
  html += buildDetailRow("Express ID", props.expressID ?? "—");
  html += buildDetailRow("Global ID",  props.globalId ?? "—");
  html += buildDetailRow("IFC Type",   type);
  html += buildDetailRow("Entity ID",  entity.id ?? "—");

  const verts = entity.vertices;
  const faces = entity.faces;
  if (Array.isArray(verts) && Array.isArray(faces)) {
    html += buildDetailRow("Vertices",  verts.length.toLocaleString());
    html += buildDetailRow("Triangles", faces.length.toLocaleString());
  }

  /* Any extra/custom properties present on the entity.properties object */
  const knownPropKeys = new Set(["expressID","globalId","ifc_type"]);
  const extraKeys = Object.keys(props).filter(k => !knownPropKeys.has(k));

  if (extraKeys.length) {
    html += `<div class="detail-props-title">Properties</div>`;
    for (const k of extraKeys) {
      let v = props[k];
      if (v !== null && typeof v === "object") {
        try { v = JSON.stringify(v); } catch(e) { v = String(v); }
      }
      html += buildDetailRow(k, v);
    }
  }

  detailBody.innerHTML = html;
  detailPopup.classList.add("visible");
}

function hideDetailPopup() {
  detailPopup.classList.remove("visible");
}

detailClose.addEventListener("click", hideDetailPopup);

/* ═══════════════════════════════════
   GEOMETRY ENGINE
   
   Backend schema (confirmed from ifc-probe.json):
   {
     expressID, globalId, name, type,
     geometry: {
       vertices: [[x,y,z], ...],   ← indexed vertex positions
       indices:  [i0,i1,i2, ...]   ← flat triangle list, 0-based
     }
   }
═══════════════════════════════════ */
const TYPE_COLORS = {
  IFCWALL:              0x9ecfff,
  IFCWALLSTANDARDCASE:  0x9ecfff,
  IFCSLAB:              0xc2d8e8,
  IFCCOLUMN:            0x8ec7ff,
  IFCBEAM:              0xf4a460,   /* sandy brown — easy to spot */
  IFCDOOR:              0xffd9a3,
  IFCWINDOW:            0xb0e2ff,
  IFCSTAIR:             0xd5b0ff,
  IFCROOF:              0x91aee8,
  IFCFURNISHINGELEMENT: 0xd3b68c,
  IFCFOOTING:           0xb09c84,
  IFCPILE:              0x9c8a73,
  IFCCURTAINWALL:       0xa9d4ff,
  IFCRAMP:              0xd5b0ff,
  IFCPLATE:             0xc7c7c7,
  IFCMEMBER:            0xf0b27a,
  DEFAULT:              0x90c8f0,
};
const SELECT_COLOR = 0xffb703;

/* CADJSON entities carry the real IFC class in properties.ifc_type
   (e.g. "IfcWall"); the top-level "type" field is always "Mesh". */
function getIfcType(entity) {
  return (entity.properties && entity.properties.ifc_type) || entity.type || "UNKNOWN";
}

function colorForType(t) {
  return TYPE_COLORS[(t||"").toUpperCase()] ?? TYPE_COLORS.DEFAULT;
}

/**
 * Build a BufferGeometry from the actual CADJSON backend schema:
 *   entity.vertices – Array of {x, y, z} objects (NOT [x,y,z] arrays)
 *   entity.faces    – Array of [i, j, k] triangle triplets (already
 *                      grouped, NOT a flat index list)
 *
 * Returns null if there's nothing usable.
 */
function buildGeometry(entity) {
  const verts = entity.vertices;  // [{x,y,z}, ...]
  const faces = entity.faces;     // [[i,j,k], ...]

  if (!Array.isArray(verts) || !verts.length || !Array.isArray(faces) || !faces.length) return null;

  /* Flatten [{x,y,z},...] → Float32Array */
  const positions = new Float32Array(verts.length * 3);
  for (let i = 0; i < verts.length; i++) {
    positions[i*3]   = verts[i].x;
    positions[i*3+1] = verts[i].y;
    positions[i*3+2] = verts[i].z;
  }

  /* Flatten [[i,j,k],...] → Uint32Array of indices */
  const indices = new Uint32Array(faces.length * 3);
  for (let i = 0; i < faces.length; i++) {
    indices[i*3]   = faces[i][0];
    indices[i*3+1] = faces[i][1];
    indices[i*3+2] = faces[i][2];
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geo.setIndex(new THREE.BufferAttribute(indices, 1));

  /* Compute smooth normals from the indexed mesh */
  geo.computeVertexNormals();

  return geo;
}

/* ═══════════════════════════════════
   SCENE BUILD
═══════════════════════════════════ */
function clearModel() {
  while (modelGroup.children.length) {
    const obj = modelGroup.children[modelGroup.children.length - 1];
    modelGroup.remove(obj);
    obj.geometry && obj.geometry.dispose();
    if (obj.material) {
      Array.isArray(obj.material)
        ? obj.material.forEach(m => m.dispose())
        : obj.material.dispose();
    }
  }
}

function fitCamera() {
  const box = new THREE.Box3().setFromObject(modelGroup);
  if (box.isEmpty()) return;

  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const fov    = camera.fov * Math.PI / 180;
  const dist   = (maxDim / (2 * Math.tan(fov / 2))) * 1.7;

  camera.position.set(
    center.x + dist * 0.8,
    center.y + dist * 0.6,
    center.z + dist * 0.8
  );
  controls.target.copy(center);
  controls.update();

  /* Align grid to model floor */
  grid.position.y = box.min.y;
}

let selectedMesh = null;

function clearSelection() {
  if (selectedMesh) {
    selectedMesh.material.color.setHex(selectedMesh.userData.baseColor);
    selectedMesh.material.emissive && selectedMesh.material.emissive.setHex(0x000000);
  }
  selectedMesh = null;
  hideDetailPopup();
}

function selectMesh(mesh) {
  if (selectedMesh === mesh) return;
  if (selectedMesh) {
    selectedMesh.material.color.setHex(selectedMesh.userData.baseColor);
    selectedMesh.material.emissive && selectedMesh.material.emissive.setHex(0x000000);
  }
  selectedMesh = mesh;
  mesh.material.color.setHex(SELECT_COLOR);
  if (mesh.material.emissive) mesh.material.emissive.setHex(0x402a00);

  showDetailPopup(mesh.userData.entity);
}

function buildScene(json) {
  clearModel();
  clearSelection();

  /* CADJSON envelope: entities live under json.entities.
     Keep fallbacks for json.data / bare array, just in case
     the backend response shape changes again. */
  const entities = Array.isArray(json.entities) ? json.entities
                  : Array.isArray(json.data)     ? json.data
                  : Array.isArray(json)          ? json
                  : [];

  log("Entities received: " + entities.length, "info");

  if (json.geometryCount !== undefined) {
    log("Backend geometryCount: " + json.geometryCount, "info");
  }

  let meshCount = 0, vertCount = 0, triCount = 0, skipped = 0;

  for (const entity of entities) {
    const type = getIfcType(entity);

    const geo = buildGeometry(entity);

    if (!geo) {
      /* No geometry in this entity (e.g. IfcRoof with empty arrays) */
      log("  No geometry: " + type + " '" + (entity.name || entity.id || "?") + "'", "warn");
      skipped++;
      continue;
    }

    const baseColor = colorForType(type);

    const mat = new THREE.MeshStandardMaterial({
      color:     baseColor,
      roughness: 0.65,
      metalness: 0.05,
      side:      THREE.DoubleSide,
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData.entity    = entity;
    mesh.userData.baseColor = baseColor;

    /* Geometry is already in world space — no placement transform needed */
    modelGroup.add(mesh);

    const posAttr = geo.attributes.position;
    const v = posAttr ? posAttr.count : 0;
    const t = geo.index ? geo.index.count / 3 : Math.round(v / 3);
    vertCount += v;
    triCount  += Math.round(t);
    meshCount++;

    log("  ✓ " + type + " '" + (entity.name || entity.id || "") + "'"
        + "  verts:" + v + "  tris:" + Math.round(t), "ok");
  }

  if (skipped > 0) {
    log(skipped + " entity/entities had no geometry (backend limitation).", "warn");
  }

  log("Meshes rendered: " + meshCount, "ok");
  log("Total verts: " + vertCount.toLocaleString()
      + "  tris: " + triCount.toLocaleString(), "ok");

  setStats(entities.length, meshCount, vertCount, triCount);
  setStatus("READY", "ready");
  emptyState.classList.add("hidden");
  hudEl.style.display = "";
  setEnabled(true);
  fitCamera();
}

/* ═══════════════════════════════════
   PICKING (click-to-select)
═══════════════════════════════════ */
const raycaster = new THREE.Raycaster();
const pointerNDC = new THREE.Vector2();

let pointerDownPos = null;
const CLICK_DRAG_TOLERANCE = 6; // px — beyond this, treat as orbit/pan, not a click

canvas.addEventListener("pointerdown", (e) => {
  pointerDownPos = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener("pointerup", (e) => {
  if (!pointerDownPos) return;
  const dx = e.clientX - pointerDownPos.x;
  const dy = e.clientY - pointerDownPos.y;
  pointerDownPos = null;

  if (Math.hypot(dx, dy) > CLICK_DRAG_TOLERANCE) return; // was a drag/orbit, not a click

  const rect = canvas.getBoundingClientRect();
  pointerNDC.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointerNDC.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(pointerNDC, camera);
  const hits = raycaster.intersectObjects(modelGroup.children, false);

  if (hits.length > 0) {
    selectMesh(hits[0].object);
  } else {
    clearSelection();
  }
});

/* ═══════════════════════════════════
   UPLOAD
═══════════════════════════════════ */
const BACKEND = "https://ifcjsonbackend-production.up.railway.app/convert-ifc";
let currentJsonStr = null;
let uploadSeq = 0;

async function loadIFC(file) {
  const seq = ++uploadSeq;

  const name = (file.name || "").toLowerCase();
  if (!name.endsWith(".ifc") && file.type !== "application/octet-stream" && file.type !== "") {
    log("Rejected: not an .ifc file.", "err");
    return;
  }

  log("Uploading: " + file.name, "info");
  setStatus("UPLOADING…", "loading");
  setLoading(true);
  hideError();

  try {
    const form = new FormData();
    form.append("file", file, file.name);

    const res = await fetch(BACKEND, { method: "POST", body: form });
    if (seq !== uploadSeq) return;

    if (!res.ok) {
      const txt = await res.text().catch(() => "");
      throw new Error("Backend " + res.status + ": " + (txt || res.statusText));
    }

    log("Upload OK – parsing…", "ok");
    setStatus("PARSING…", "loading");

    const json = await res.json();
    if (seq !== uploadSeq) return;

    currentJsonStr = JSON.stringify(json, null, 2);
    buildScene(json);

  } catch(err) {
    if (seq !== uploadSeq) return;
    log("Error: " + err.message, "err");
    setStatus("ERROR", "error");
    showError(err.message);
  } finally {
    if (seq === uploadSeq) setLoading(false);
  }
}

/* ═══════════════════════════════════
   UI WIRING
═══════════════════════════════════ */
const dropArea  = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

dropArea.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", e => {
  const f = e.target.files && e.target.files[0];
  if (f) loadIFC(f);
  fileInput.value = "";
});

dropArea.addEventListener("dragover",  e => { e.preventDefault(); e.stopPropagation(); dropArea.classList.add("drag-over"); });
dropArea.addEventListener("dragleave", e => { e.preventDefault(); e.stopPropagation(); dropArea.classList.remove("drag-over"); });
dropArea.addEventListener("drop", e => {
  e.preventDefault(); e.stopPropagation();
  dropArea.classList.remove("drag-over");
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) loadIFC(f);
});
window.addEventListener("dragover", e => { if (e.dataTransfer) e.preventDefault(); });
window.addEventListener("drop",     e => { if (e.dataTransfer) e.preventDefault(); });

document.getElementById("btnDownload").addEventListener("click", () => {
  if (!currentJsonStr) return;
  const blob = new Blob([currentJsonStr], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "ifc.json"; a.click();
  URL.revokeObjectURL(url);
  log("JSON downloaded.", "ok");
});

document.getElementById("btnFit").addEventListener("click", fitCamera);

document.getElementById("btnReset").addEventListener("click", () => {
  uploadSeq++;
  clearModel();
  clearSelection();
  currentJsonStr = null;
  logEl.textContent = "";
  document.getElementById("statsBlock").style.display = "none";
  emptyState.classList.remove("hidden");
  hudEl.style.display = "none";
  grid.position.y = 0;
  hideError();
  setEnabled(false);
  setStatus("IDLE");
  setLoading(false);
});
</script>
