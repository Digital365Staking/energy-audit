<!DOCTYPE html>
<html>
<head>
  <title>Meria ATOM Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #b0e2ff;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
    }

    h1 {
      color: #0b3c5d;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #e6f7ff;
      border-left: 5px solid #1890ff;
      padding: 20px;
      border-radius: 10px;
    }

    .value {
      font-size: 2rem;
      font-weight: bold;
      color: #0b3c5d;
    }

    .label {
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔵 ATOM Staking Dashboard</h1>

  <div class="grid">

    <div class="card">
      <div class="label">Total Staked (ATOM)</div>
      <div id="staked" class="value">...</div>
    </div>

    <div class="card">
      <div class="label">Earnings This Month (ATOM)</div>
      <div id="earned" class="value">...</div>
    </div>

  </div>

</div>

<script>

const WALLET = "YOUR_WALLET_HERE";

const stakingURL =
  "https://staking-api.meria.com/v1/stakings/ATOM";

function getStartOfMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}

function getToday() {
  return new Date().toISOString().split("T")[0];
}

const earningsURL =
  `https://staking-api.meria.com/v1/reporting/earnings/by-day/by-wallet`;

function buildEarningsURL() {
  return `${earningsURL}?begDate=${getStartOfMonth()}&endDate=${getToday()}&wallet=${WALLET}`;
}

// ---------------- STAKED ----------------
async function loadStaked() {
  const res = await fetch(stakingURL);
  const data = await res.json();

  const staked = Number(data?.amount || 0);

  document.getElementById("staked").innerText =
    staked.toFixed(6);
}

// ---------------- EARNINGS ----------------
async function loadEarnings() {
  const res = await fetch(buildEarningsURL());
  const data = await res.json();

  let total = 0;

  const earnings = data?.[0]?.earnings || [];

  earnings.forEach(asset => {
    if (asset.stakingIdentifier === "ATOM") {
      asset.rewardsByDay.forEach(day => {
        total += Number(day.rewards || 0);
      });
    }
  });

  document.getElementById("earned").innerText =
    total.toFixed(6);
}

// ---------------- INIT ----------------
async function init() {
  await loadStaked();
  await loadEarnings();
}

init();
setInterval(init, 60000);

</script>

</body>
</html>
