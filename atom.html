<!DOCTYPE html>
<html>
<head>
  <title>Meria ATOM Analytics Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #b0e2ff;
      color: #1a1a1a;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 { color: #0b3c5d; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #e6f7ff;
      border-left: 5px solid #1890ff;
      padding: 20px;
      border-radius: 10px;
    }

    .value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #0b3c5d;
    }

    .small {
      font-size: 0.9rem;
      color: #555;
      margin-top: 5px;
    }

    canvas {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔵 Meria ATOM Analytics Dashboard</h1>
  <p>Real staking + real rewards (Reporting API based)</p>

  <div class="grid">

    <div class="card">
      <div class="label">💰 Staked ATOM</div>
      <div id="staked" class="value">...</div>
      <div class="small">Current position</div>
    </div>

    <div class="card">
      <div class="label">🌱 Rewards (This Month)</div>
      <div id="rewards" class="value">...</div>
      <div class="small">Sum of daily earnings</div>
    </div>

    <div class="card">
      <div class="label">💶 ATOM Price (EUR)</div>
      <div id="price" class="value">...</div>
    </div>

    <div class="card">
      <div class="label">💵 Rewards Value (EUR)</div>
      <div id="rewardsEur" class="value">...</div>
    </div>

  </div>

  <canvas id="chart" height="100"></canvas>

</div>

<script>

const WALLET = "YOUR_WALLET_HERE";

const earningsURL =
  `https://staking-api.meria.com/v1/reporting/earnings/by-day/by-wallet?begDate=${getMonthStart()}&endDate=${getToday()}&wallet=${WALLET}`;

const stakingURL =
  `https://staking-api.meria.com/v1/stakings/ATOM`;

const priceURL =
  "https://api.coingecko.com/api/v3/simple/price?ids=cosmos&vs_currencies=eur";

let atomPrice = 0;

function getToday() {
  return new Date().toISOString().split("T")[0];
}

function getMonthStart() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}

// ---------------- PRICE ----------------
async function loadPrice() {
  const res = await fetch(priceURL);
  const data = await res.json();

  atomPrice = data.cosmos.eur;

  document.getElementById("price").innerText =
    atomPrice.toFixed(2) + " €";
}

// ---------------- STAKING ----------------
async function loadStaking() {
  const res = await fetch(stakingURL);
  const data = await res.json();

  const staked = data?.amount || 0;

  document.getElementById("staked").innerText =
    Number(staked).toFixed(6);
}

// ---------------- EARNINGS ----------------
async function loadEarnings() {
  const res = await fetch(earningsURL);
  const data = await res.json();

  let total = 0;
  let labels = [];
  let values = [];

  // structure: wallet -> earnings -> rewardsByDay
  const earnings = data?.[0]?.earnings || [];

  earnings.forEach(asset => {
    if (asset.stakingIdentifier === "ATOM") {

      asset.rewardsByDay.forEach(day => {
        const amount = Number(day.rewards || 0);
        total += amount;

        labels.push(day.date);
        values.push(amount);
      });
    }
  });

  document.getElementById("rewards").innerText =
    total.toFixed(6);

  document.getElementById("rewardsEur").innerText =
    (total * atomPrice).toFixed(2) + " €";

  renderChart(labels, values);
}

// ---------------- CHART ----------------
function renderChart(labels, values) {
  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Daily ATOM Rewards",
        data: values,
        fill: true,
        tension: 0.3
      }]
    }
  });
}

// ---------------- INIT ----------------
async function init() {
  await loadPrice();
  await loadStaking();
  await loadEarnings();
}

init();
setInterval(init, 60000);

</script>

</body>
</html>
