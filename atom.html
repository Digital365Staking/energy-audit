<!DOCTYPE html>
<html>
<head>
  <title>ATOM Monthly Staking Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #b0e2ff;
      color: #1a1a1a;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      color: #0b3c5d;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #e6f7ff;
      border-left: 5px solid #1890ff;
      padding: 20px;
      border-radius: 10px;
    }

    .label {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #0b3c5d;
    }

    .small {
      margin-top: 5px;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔵 ATOM Monthly Staking Dashboard</h1>
  <p>Real-time staking + rewards + EUR valuation</p>

  <div class="grid">

    <div class="card">
      <div class="label">💰 Staking this month (ATOM)</div>
      <div id="stakedAtom" class="value">...</div>
      <div class="small" id="stakedEur">...</div>
    </div>

    <div class="card">
      <div class="label">🌱 Rewards earned (ATOM)</div>
      <div id="rewardsAtom" class="value">...</div>
      <div class="small" id="rewardsEur">...</div>
    </div>

    <div class="card">
      <div class="label">💶 ATOM price (EUR)</div>
      <div id="price" class="value">...</div>
    </div>

    <div class="card">
      <div class="label">💵 Total earned (EUR)</div>
      <div id="totalEur" class="value">...</div>
    </div>

  </div>
  <div class="cta-group">
        <a href="http://www.meria.com/r/pvKKfbZ5" class="cta">I want to stake</a>
  </div>

</div>

<script>

const workerURL = "https://meria-worker.digital365staking.workers.dev/";
const coingeckoURL = "https://api.coingecko.com/api/v3/simple/price?ids=cosmos&vs_currencies=eur";

let atomPrice = 0;

async function loadPrice() {
  const res = await fetch(coingeckoURL);
  const data = await res.json();
  atomPrice = data.cosmos.eur;

  document.getElementById("price").innerText =
    atomPrice.toFixed(2) + " €";
}

async function loadStaking() {
  const res = await fetch(workerURL);
  const data = await res.json();

  console.log(data);

  // ⚠️ adapte selon structure réelle API Meria
  const staked = data?.data?.amount || 0;
  const rewards = data?.data?.reward || 0;

  const stakedEur = staked * atomPrice;
  const rewardsEur = rewards * atomPrice;
  const totalEur = rewardsEur;

  document.getElementById("stakedAtom").innerText = staked;
  document.getElementById("rewardsAtom").innerText = rewards;

  document.getElementById("stakedEur").innerText =
    stakedEur.toFixed(2) + " €";

  document.getElementById("rewardsEur").innerText =
    rewardsEur.toFixed(2) + " €";

  document.getElementById("totalEur").innerText =
    totalEur.toFixed(2) + " €";
}

async function refresh() {
  await loadPrice();
  await loadStaking();
}

refresh();
setInterval(refresh, 15000);

</script>

</body>
</html>
